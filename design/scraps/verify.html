<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>verify</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&family=Hanken+Grotesk:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #d9d6d0; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes pulseRing { from { transform: scale(.35); opacity: .6; } to { transform: scale(1.9); opacity: 0; } }
  @keyframes pulseBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  @keyframes pulseParticle { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-190px); opacity: 0; } }
  @keyframes pulseBurst { from { transform: scale(.55); opacity: .85; } to { transform: scale(1.7); opacity: 0; } }
  @keyframes tapRing { from { transform: scale(.7); opacity: .5; } to { transform: scale(1.75); opacity: 0; } }
  @keyframes tapBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
  @keyframes tapConfetti { from { transform: translate(-50%, 0) rotate(0deg); opacity: 1; } to { transform: translate(calc(-50% + var(--dx)), 170px) rotate(var(--dr)); opacity: 0; } }
  .grid { display: grid; grid-template-columns: repeat(3, 175px); gap: 30px 18px; padding: 24px; }
  .cell { width: 175px; }
  .cap { font: 600 12px Manrope, sans-serif; color: #555; margin: 0 0 6px 2px; }
  .scaler { width: 412px; height: 892px; transform: scale(.4); transform-origin: top left; }
  .holder { width: 165px; height: 357px; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../android-frame.jsx"></script>
<script type="text/babel" src="../shared.jsx"></script>
<script type="text/babel" src="../ConceptPulse.jsx"></script>
<script type="text/babel" src="../ConceptTap.jsx"></script>
<script type="text/babel" src="../ConceptBeam.jsx"></script>
<script type="text/babel">
  function Cell({ cap, dark, bg, children }) {
    return (
      <div className="cell">
        <p className="cap">{cap}</p>
        <div className="holder"><div className="scaler">
          <AndroidDevice width={412} height={892} dark={dark} bg={bg}>{children}</AndroidDevice>
        </div></div>
      </div>
    );
  }
  function App() {
    const rows = [
      ['pair', { pulse: 'ready', tap: 'snap', beam: 'link' }, 0],
      ['transfer', { pulse: 'transfer', tap: 'transfer', beam: 'transfer' }, 0.6],
      ['done', { pulse: 'done', tap: 'done', beam: 'done' }, 1],
    ];
    return (
      <div className="grid">
        {rows.map(([rn, ph, t]) => [
          <Cell key={rn+'p'} cap={`Pulse · ${ph.pulse}`} dark bg="#0c111b"><PulseConcept debugPhase={ph.pulse} debugT={t} /></Cell>,
          <Cell key={rn+'t'} cap={`Tap · ${ph.tap}`} bg="#fbfaf7"><TapConcept debugPhase={ph.tap} debugT={t} /></Cell>,
          <Cell key={rn+'b'} cap={`Beam · ${ph.beam}`} bg="#f4f2ec"><BeamConcept debugPhase={ph.beam} debugT={t} /></Cell>,
        ])}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

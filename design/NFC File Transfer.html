<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NFC File Transfer · Concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&family=Hanken+Grotesk:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #efece6; }
  #root { height: 100%; }

  /* ── shared ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ── Pulse ── */
  @keyframes pulseRing { from { transform: scale(.35); opacity: .6; } to { transform: scale(1.9); opacity: 0; } }
  @keyframes pulseBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  @keyframes pulseParticle { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-190px); opacity: 0; } }
  @keyframes pulseBurst { from { transform: scale(.55); opacity: .85; } to { transform: scale(1.7); opacity: 0; } }

  /* ── Tap ── */
  @keyframes tapRing { from { transform: scale(.7); opacity: .5; } to { transform: scale(1.75); opacity: 0; } }
  @keyframes tapBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
  @keyframes tapConfetti {
    from { transform: translate(-50%, 0) rotate(0deg); opacity: 1; }
    to   { transform: translate(calc(-50% + var(--dx)), 170px) rotate(var(--dr)); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#efece6">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#efece6" />
    <circle cx="600" cy="560" r="14" fill="#23201b" />
    <circle cx="600" cy="260" r="14" fill="none" stroke="#b07a32" stroke-width="4" />
    <line x1="600" y1="560" x2="600" y2="260" stroke="#b07a32" stroke-width="4" />
    <circle cx="600" cy="400" r="9" fill="#b07a32" />
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="ConceptPulse.jsx"></script>
<script type="text/babel" src="ConceptTap.jsx"></script>
<script type="text/babel" src="ConceptBeam.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function Frame({ children, dark, bg }) {
    return (
      <AndroidDevice width={412} height={892} dark={dark} bg={bg}>
        {children}
      </AndroidDevice>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="nfc"
          title="NFC File Transfer — 3 directions"
          subtitle="Each phone loops the full flow: standby → detect → pair → transfer → done. Tap the replay chip to re-run.">
          <DCArtboard id="pulse" label="A · Pulse — radar / glow" width={412} height={892}>
            <Frame dark bg="#0c111b"><PulseConcept /></Frame>
          </DCArtboard>
          <DCArtboard id="tap" label="B · Tap — friendly / cards" width={412} height={892}>
            <Frame bg="#fbfaf7"><TapConcept /></Frame>
          </DCArtboard>
          <DCArtboard id="beam" label="C · Beam — minimal / editorial" width={412} height={892}>
            <Frame bg="#f4f2ec"><BeamConcept /></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
